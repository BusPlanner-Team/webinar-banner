<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusPlanner Webinar Banner Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="6" fill="#FCBA30"/>
                <text x="16" y="22" text-anchor="middle" font-family="Montserrat" font-weight="800" font-size="16" fill="#00274C">B</text>
            </svg>
            <span>Webinar Banner Generator</span>
        </div>
    </nav>

    <main class="app-layout">
        <aside class="controls-panel">
            <section class="control-group">
                <h3>Top Bar</h3>
                <label class="toggle-row">
                    <input type="checkbox" id="topBarEnabled">
                    <span>Show top bar</span>
                </label>
                <label>
                    <span>Bar Text</span>
                    <input type="text" id="topBarText" placeholder="e.g., Full Recording Inside!" value="Full Recording Inside!">
                </label>
            </section>

            <section class="control-group">
                <h3>Webinar Details</h3>
                <label>
                    <span>Series Label (shown on banner)</span>
                    <input type="text" id="seriesLabel" placeholder="e.g., BusPlanner Community Sessions" value="BusPlanner Community Sessions">
                </label>
                <label>
                    <span>Webinar Title</span>
                    <input type="text" id="webinarTitle" placeholder="e.g., Redistricting Through the Lens of K-12 Transportation" value="">
                </label>
                <label>
                    <span>Subtitle (optional)</span>
                    <input type="text" id="webinarSubtitle" placeholder="e.g., Practical strategies for boundary changes">
                </label>
                <label>
                    <span>Date</span>
                    <input type="text" id="webinarDate" placeholder="e.g., Tuesday, March 25, 2026">
                </label>
                <label>
                    <span>Time</span>
                    <input type="text" id="webinarTime" placeholder="e.g., 1:00 PM ET">
                </label>
                <label>
                    <span>Platform</span>
                    <input type="text" id="webinarPlatform" placeholder="e.g., Zoho Meeting, Zoom, Microsoft Teams" value="Zoho Meeting">
                </label>
            </section>

            <section class="control-group">
                <h3>Speakers</h3>
                <p class="hint-text">Headshots appear as ovals with gold arches on the banner</p>
                <div id="speakersList"></div>
                <button id="addSpeakerBtn" class="add-btn">+ Add Speaker</button>
            </section>

            <section class="control-group">
                <h3>Typography</h3>
                <label>
                    <span>Title Size</span>
                    <select id="titleSize">
                        <option value="24">24px</option>
                        <option value="26">26px</option>
                        <option value="28">28px</option>
                        <option value="30">30px</option>
                        <option value="32">32px</option>
                        <option value="36" selected>36px</option>
                        <option value="40">40px</option>
                        <option value="44">44px</option>
                        <option value="48">48px</option>
                    </select>
                </label>
                <label>
                    <span>Subtitle Size</span>
                    <select id="subtitleSize">
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18" selected>18px</option>
                        <option value="20">20px</option>
                        <option value="22">22px</option>
                        <option value="24">24px</option>
                    </select>
                </label>
                <label>
                    <span>Details Size</span>
                    <select id="detailsSize">
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16" selected>16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                        <option value="22">22px</option>
                        <option value="24">24px</option>
                    </select>
                </label>
            </section>

            <section class="control-group">
                <h3>Call to Action</h3>
                <label>
                    <span>Button Text</span>
                    <input type="text" id="ctaText" value="Register Now" placeholder="e.g., Save Your Spot">
                </label>
            </section>

            <section class="control-group">
                <h3>Export</h3>
                <div class="export-options">
                    <label>
                        <span>Format</span>
                        <select id="exportFormat">
                            <option value="png">PNG (lossless)</option>
                            <option value="jpeg">JPEG (smaller)</option>
                        </select>
                    </label>
                    <label>
                        <span>Quality</span>
                        <select id="exportQuality">
                            <option value="2">Standard (2x)</option>
                            <option value="3" selected>High (3x)</option>
                            <option value="4">Ultra (4x)</option>
                        </select>
                    </label>
                </div>
                <button id="downloadBtn" class="download-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Banner
                </button>
            </section>
        </aside>

        <section class="preview-panel">
            <div class="preview-header">
                <h3>Live Preview</h3>
                <div class="preview-size-info" id="previewSizeInfo">Output: 1200 x 842</div>
            </div>
            <div class="preview-container">
                <div id="bannerPreview" class="banner-preview">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                        <p>Start filling in details to see your banner</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
